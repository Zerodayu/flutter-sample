name: SonarQube Cloud Scan
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube-scan:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    steps:
      # 1. Download full repository history (required for accurate analysis)
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Flutter SDK (required to resolve Dart/Flutter dependencies)
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Install Flutter dependencies
      - name: Install Flutter Dependencies
        run: flutter pub get

      # 4. Run the SonarQube Cloud scan
      # sonarqube-scan-action reads sonar-project.properties automatically
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
